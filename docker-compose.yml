services:
  # Optional: only used when VIDGREP_VECTORDB=qdrant on the ML service.
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  ml:
    build: ./ml-pipeline-python
    environment:
      VIDGREP_CLIP: mock            # set to 'real' + install the clip extra for true CLIP
      VIDGREP_VECTORDB: memory      # or 'qdrant' with QDRANT_URL=http://qdrant:6333
    ports:
      - "8000:8000"

  gateway:
    # Built from the repo root so the image can bake in the Rust processor binary.
    build:
      context: .
      dockerfile: gateway-go/Dockerfile
    environment:
      VIDGREP_ML_URL: http://ml:8000
      VIDGREP_WORKERS: "4"
    ports:
      - "8080:8080"
    depends_on:
      - ml

  frontend:
    build: ./frontend-ts
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - gateway
